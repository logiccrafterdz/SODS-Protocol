name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      
    - name: Check Formatting
      run: cargo fmt -- --check
      
    - name: Run Clippy
      # We allow warnings for now, but in the future we can use -D warnings
      run: cargo clippy --workspace --exclude sods-zk -- -W warnings
      
    - name: Run Tests
      run: cargo test --workspace --exclude sods-zk
