name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build, Lint, and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Check Formatting
      run: cargo fmt -- --check

    - name: Run Clippy (Zero Tolerance)
      run: cargo clippy --workspace -- -D warnings

    - name: Run Unit Tests
      run: cargo test --workspace --lib

    - name: Run Integration Tests
      run: cargo test --workspace --tests

    - name: Keccak-Solidity Parity Check
      run: cargo test -p sods-core test_leaf_hash_matches_solidity

    - name: Cross-Layer Consistency Check
      run: cargo test -p sods-verifier --test consistency
